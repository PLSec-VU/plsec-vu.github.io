backend:
  name: github
  repo: vusecpl/vusecpl.github.io
  branch: dev

local_backend: true
publish_mode: editorial_workflow
media_folder: public/assets/uploads
public_folder: /website/assets/uploads

collections:
  - name: posts
    label: Posts
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Date, name: date, widget: datetime }
      - { label: Authors, name: authors, widget: list, required: false }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }
  - name: news
    label: News
    folder: src/content/news
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Date, name: date, widget: datetime }
      - { label: Link, name: link, widget: string, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown, required: false }
  - name: people
    label: People
    folder: src/content/people
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Role, name: role, widget: select, options: ["Faculty", "Postdoc", "PhD Student", "MSc Student", "Researcher", "Alumni"] }
      - { label: Sort Order, name: order, widget: number, default: 100 }
      - { label: Email, name: email, widget: string, required: false }
      - { label: Website, name: website, widget: string, required: false }
      - { label: Photo, name: photo, widget: image, required: false }
      - { label: Interests, name: interests, widget: list, required: false }
      - { label: Bio, name: body, widget: markdown, required: false }
  - name: projects
    label: Projects
    folder: src/content/projects
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Status, name: status, widget: select, options: ["Active", "Completed"], default: "Active" }
      - { label: People, name: people, widget: list, required: false }
      - label: Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - { label: Body, name: body, widget: markdown }
  - name: publications
    label: Publications
    folder: src/content/publications
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Authors, name: authors, widget: list }
      - { label: Venue, name: venue, widget: string }
      - { label: Year, name: year, widget: number }
      - { label: Tags, name: tags, widget: list, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - label: Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - { label: Abstract, name: body, widget: markdown, required: false }
